name: Clean Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
      
      - name: Clean previous builds
        run: |
          rm -rf android
          rm -rf ios
          rm -rf node_modules/.cache
      
      - name: Check widget files
        run: |
          echo "Checking widget files..."
          find . -name "*.xml" -path "*/widget*" -o -name "*.kt" -path "*/widget*"
          echo "---"
          ls -la widgets/android/src/main/res/layout/ 2>/dev/null || echo "No widget layout files"
          echo "---"
          ls -la android/app/src/main/java/com/mkhailksk/famnotes/widget/ 2>/dev/null || echo "No widget java files"
      
      - name: Expo prebuild
        run: npx expo prebuild --clean --platform android
      
      - name: Check after prebuild
        run: |
          echo "Files after prebuild:"
          ls -la android/app/src/main/res/layout/ | head -20
          echo "---"
          ls -la android/app/src/main/java/com/mkhailksk/famnotes/ | head -20
      
      - name: Build Android APK with full logs
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --stacktrace --info --no-daemon 2>&1 | tee build.log
        continue-on-error: true
      
      - name: Show error if build failed
        if: failure()
        run: |
          echo "=== BUILD LOG ==="
          tail -200 android/build.log
          echo "=== ERROR SUMMARY ==="
          grep -A 20 "FAILURE\|error\|Error\|Exception" android/build.log | tail -100
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
      
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/build.log
            android/app/build/reports/
