name: Сборка APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4
      
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          # cache убран, так как нет package-lock.json
      
      - name: ☕ Установка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 📱 Установка Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 🚀 Установка Expo CLI
        run: npm install -g expo-cli eas-cli
      
      - name: 📦 Установка зависимостей
        run: npm install  # или npm ci, если есть package-lock.json
      
      - name: 🔨 Сборка Android APK
        run: |
          npx expo prebuild --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: 💾 Сохранение APK
        uses: actions/upload-artifact@v4
        with:
          name: FamNote-APK
          path: android/app/build/outputs/apk/release/app-release.apk
